<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 · Page Not Found · EstateIQ</title>
  {% include 'partials/favicon.html' %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 100px 32px;
      flex: 1;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: 120px;
      font-weight: 700;
      line-height: 1;
      background: var(--gradient-signature);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    .error-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .error-sub {
      color: var(--text-secondary);
      font-size: 15px;
      max-width: 40ch;
      margin-bottom: 32px;
    }
    .error-actions {
      display: flex;
      gap: 14px;
      justify-content: center;
    }
    .error-actions .btn-primary {
      width: auto;
      padding: 12px 24px;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    {% include 'partials/navbar.html' %}

    <div class="error-page">
      <div class="error-code">404</div>
      <div class="error-title">Page not found</div>
      <p class="error-sub">The page you're looking for doesn't exist or has been moved.</p>
      <div class="error-actions">
        <a href="/" class="btn btn-primary">Go home</a>
        <a href="/predict" class="btn btn-ghost">Try a prediction</a>
      </div>
    </div>

    {% include 'partials/footer.html' %}
  </div>

  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
